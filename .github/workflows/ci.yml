name: CI

# The cross-platform ACCEPTANCE GATE (SDLC release gate, part 1). The suite is
# stdlib-only and self-contained, so it runs with NO third-party dependency:
# `python -m unittest` is the runner (not pytest), and the only setup is
# installing Python itself. No secrets, no agent, no network. A green matrix
# here is NECESSARY but NOT SUFFICIENT for a release -- the recorded
# measurement runs (NFR-12) are the other half, and a green run here is what
# lets the §9 cadence/Windows floor row eventually flip (it stays PENDING until
# an operator observes this matrix green and records it).

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acceptance:
    name: acceptance ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      # see EVERY platform's result, not just the first failure -- the point of
      # the matrix is to surface Windows-specific defects, not hide them.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Acceptance + unit suite (stdlib unittest, no deps)
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - name: Smoke gate (core scenarios)
        run: python tests/integration/smoke.py

  package-smoke:
    # Mirrors the 13a publish-safety smoke: build the wheel and run the INSTALLED
    # console script. One platform is enough for the packaging check.
    name: package smoke (build + install wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build the wheel and smoke the installed console script
        run: |
          python -m pip install --upgrade build
          python -m build
          python -m pip install dist/*.whl
          arunner --version
